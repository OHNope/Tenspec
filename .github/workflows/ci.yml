name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON: python3
  BUILD_JOBS: "2"
  XMAKE_ROOT: "y"

jobs:
  environment:
    name: Environment probe
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/environment
          cache-key: ${{ runner.os }}-gcc16-ci-success-environment-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/**', 'packages/**') }}

      - name: Setup xmake
        if: steps.ci.outputs.run == 'true'
        uses: ./.github/actions/setup-xmake
        with:
          check-env: "true"
          xmake-install-cache-key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          xmake-install-restore-prefix: ${{ runner.os }}-gcc16-xmake-install-

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/environment
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}

  cpp-debug:
    name: Build and run cpp debug example
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/cpp-debug
          cache-key: ${{ runner.os }}-gcc16-ci-success-cpp-debug-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/env.sh', 'scripts/bootstrap_xmake.sh', 'packages/l/libtorch-bin/xmake.lua', 'src/**', 'third_party/fast_io/**', 'examples/**') }}

      - name: Setup xmake
        if: steps.ci.outputs.run == 'true'
        uses: ./.github/actions/setup-xmake
        with:
          cache-packages: "true"
          configure: debug
          xmake-install-cache-key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          xmake-install-restore-prefix: ${{ runner.os }}-gcc16-xmake-install-
          xmake-package-cache-key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          xmake-package-restore-prefix: ${{ runner.os }}-gcc16-xmake-

      - name: Build typetorch_cpp_debug
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_cpp_debug

      - name: Run typetorch_cpp_debug
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake run typetorch_cpp_debug

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/cpp-debug
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}

  tensor-test:
    name: Build and run tensor arithmetic test
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/tensor-test
          cache-key: ${{ runner.os }}-gcc16-ci-success-tensor-test-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/env.sh', 'scripts/bootstrap_xmake.sh', 'packages/l/libtorch-bin/xmake.lua', 'src/**', 'third_party/fast_io/**', 'tests/tensor_arithmetic_test.cpp') }}

      - name: Setup xmake
        if: steps.ci.outputs.run == 'true'
        uses: ./.github/actions/setup-xmake
        with:
          cache-packages: "true"
          configure: debug
          xmake-install-cache-key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          xmake-install-restore-prefix: ${{ runner.os }}-gcc16-xmake-install-
          xmake-package-cache-key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          xmake-package-restore-prefix: ${{ runner.os }}-gcc16-xmake-

      - name: Build tensor arithmetic test
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_tensor_arithmetic_test

      - name: Run tensor arithmetic test
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake run typetorch_tensor_arithmetic_test

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/tensor-test
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}

  capi-extension:
    name: Build Python C API extension
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/capi-extension
          cache-key: ${{ runner.os }}-gcc16-ci-success-capi-extension-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/env.sh', 'scripts/bootstrap_xmake.sh', 'packages/l/libtorch-bin/xmake.lua', 'src/**', 'third_party/fast_io/**', 'bindings/**') }}

      - name: Setup xmake
        if: steps.ci.outputs.run == 'true'
        uses: ./.github/actions/setup-xmake
        with:
          cache-packages: "true"
          configure: debug
          xmake-install-cache-key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          xmake-install-restore-prefix: ${{ runner.os }}-gcc16-xmake-install-
          xmake-package-cache-key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          xmake-package-restore-prefix: ${{ runner.os }}-gcc16-xmake-

      - name: Build Python C API extension
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          xmake build -j "$BUILD_JOBS" typetorch_capi_ext

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/capi-extension
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}

  probes:
    name: Build and run size probes
    runs-on: ubuntu-24.04
    container:
      image: gcc:16
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Decide whether to run
        id: ci
        uses: ./.github/actions/ci-should-run
        with:
          marker-path: .ci-success/probes
          cache-key: ${{ runner.os }}-gcc16-ci-success-probes-${{ hashFiles('.github/workflows/ci.yml', '.github/actions/**', 'xmake.lua', 'scripts/env.sh', 'scripts/bootstrap_xmake.sh', 'scripts/check_env.sh', 'scripts/nm_size_probe.sh', 'packages/l/libtorch-bin/xmake.lua', 'src/**', 'third_party/fast_io/**', 'tests/binary_size_*') }}

      - name: Setup xmake
        if: steps.ci.outputs.run == 'true'
        uses: ./.github/actions/setup-xmake
        with:
          cache-packages: "true"
          configure: debug
          check-env: "true"
          xmake-install-cache-key: ${{ runner.os }}-gcc16-xmake-install-${{ hashFiles('scripts/bootstrap_xmake.sh') }}
          xmake-install-restore-prefix: ${{ runner.os }}-gcc16-xmake-install-
          xmake-package-cache-key: ${{ runner.os }}-gcc16-xmake-${{ hashFiles('xmake.lua', 'packages/l/libtorch-bin/xmake.lua') }}
          xmake-package-restore-prefix: ${{ runner.os }}-gcc16-xmake-

      - name: Run size probes
        if: steps.ci.outputs.run == 'true'
        run: |
          source scripts/env.sh
          bash scripts/nm_size_probe.sh debug

      - name: Save successful ci result
        if: steps.ci.outputs.run == 'true' && steps.ci.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-ci-success
        with:
          marker-path: .ci-success/probes
          cache-key: ${{ steps.ci.outputs.cache-primary-key }}
